<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel ltinerary ログイン</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      width: 360px;
      max-width: 90%;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0, 0, 0, .15);
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      cursor: pointer;
      margin-bottom: 10px;
    }

    #message {
      color: red;
      text-align: center;
      min-height: 24px;
    }
  </style>

</head>

<body>

  <div class="login-box">

    <h2>Travel ltinerary</h2>

    <input type="email" id="email" placeholder="メールアドレス">

    <input type="password" id="password" placeholder="パスワード">

    <button id="loginBtn">
      ログイン
    </button>

    <button id="registerBtn">
      新規登録
    </button>

    <div id="message"></div>

  </div>

  <script type="module" src="firebase.js"></script>

</body>

</html>
