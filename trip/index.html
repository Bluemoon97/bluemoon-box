<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Travel Itinerary</title>
<style>
body{font-family:sans-serif;margin:0;background:#f5f5f5}
header h1{background:#0e6d07;color:#fff;margin:0;padding:15px;font-size:20px}

.controls{
  display:flex;
  gap:10px;
  padding:10px;
  background:#f5f5f5; /* 薄グレー */
}
.controls button{
  flex:1;
  padding:12px;
  font-size:14px;
  background:#0e6d07;   /* ヘッダーと同じ緑 */
  color:#fff;           /* 文字白 */
  border:none;
  border-radius:6px;
  cursor:pointer;
  transition:0.2s;
}
/* ホバー（マウス乗せたとき） */
.controls button:hover{
  background:#095a05;   /* 少し濃くする */
}
.home{margin:10px;background:#fff;border-radius:10px;overflow:hidden}
#container-wrapper{ background:#fff; /* ←白にする */ }
.row{
  display:flex;
  border-bottom:1px solid #ddd;
  height:80px;              /* ←少し余裕ある高さに */
  align-items:stretch;      /* ←これ重要（中央揃えやめる） */
}
.row .platform input{
  display:block;
  height:22px;
  line-height:24px;
}
.row .platform input:nth-child(2){
  margin-top:4px;
}
.top-row{
  display:flex;
  height:80px;
  background:#f5f5f5;
}
.cell-third{
  width:33.33%;
  display:flex;
  align-items:center;
  justify-content:center;
}
.cell-left{
  width:33.33%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.cell-right{
  width:66.66%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:7px;   /* ←これで全部の間隔が広がる */
}
.cell-right div{
  line-height:1.2;
}
.dark input {
  color: #fff;
}
.dark input::placeholder {
  color: #ddd;
}
.dark{background:#555;color:#fff}
.platform{
  position: relative;
  gap:10px;   /* ←上下の間隔広げる（8〜12で調整OK） */
}
.platform::after{
  content:"";
  position:absolute;
  top:0;
  right:0;
  width:6px;
  height:100%;
  background:#ff5a2f; /* オレンジ×赤 */
}
.platform input{
  display:block;
  height:24px;              /* ←高さ固定 */
  line-height:24px;
}
.platform input:nth-child(2){
  margin-top: 4px;
}
.time-group input{
  height:24px;
}
.dark input[type="time"]{
  color:#fff;
  font-size:16px;
  -webkit-text-fill-color:#fff;
}
input[type="time"]{
  border:none;
  background:transparent;
  font-size:16px;   /* ←少し小さめに */
  height:40px;      /* ←高さ統一（重要） */
}

input::placeholder {
  color: #999;
}
.dark input::placeholder {
  color: #ccc;
}
input::-webkit-input-placeholder {
  color: #999;
}
.dark input::-webkit-input-placeholder {
  color: #ccc;
}
.white{background:#fff}
.light{background:#eee}

.time-fare{
  display:flex;
  gap:6px;
}
.time-fare input{
  flex:1;
  text-align:left;   /* ←左寄せ */
  padding-left:6px;  /* ←少し余白つけると見やすい */
}
input{width:75%;border:none;background:transparent;font-size:16px}
.small{font-size:12px}
.big{font-size:18px;font-weight:bold}

textarea{width:100%;border:none}
.big{
  font-size:20px;
  font-weight:bold;
  letter-spacing:1px;   /* ちょい広げる */
}
.memo{
  display:flex;
  flex-direction:column;  /* ←縦並び強制 */
  width:100%;
  padding:8px;
}
.memo textarea{
  width:100%;
  box-sizing:border-box;   /* ←これ超重要 */
  display:block;
  margin-bottom:8px;
  border:1px solid #ccc;
  border-radius:6px;
  padding:8px;
}
.memo textarea:last-child{
  margin-bottom:0;
}
.memo-big{
  font-size:15px;
}
.memo-small{
  font-size:12px;
  color:#666;
}
.row.memo{
  width:100%;
  background:#f5f5f5;     /* ←薄いグレー背景 */
  border:1px solid #ccc;  /* ←外枠 */
  border-radius:6px;
  padding:8px;
  box-sizing:border-box;
}

   /* ハンバーガーメニュー */
    #hamburger {
        opacity: 0;
        position: fixed;
    }

    label .burger {
        position: fixed;
        top: 1.6rem;
        right: 1rem;
        z-index: 3;
        width: 1.5rem;
        height: 1.6rem;
    }

    label .burger::before,
    label .burger::after,
    label .burger .bar {
        position: absolute;
        left: 0;
        width: 100%;
        height: 0.25rem;
        border-radius: 5px;
        background-color: #808080;
        content: "";
        transition: all 0.5s;
    }

    label .burger::before {
        top: 0;
        transform-origin: top right;
        /* /起点を固定させる(起点右上) */
    }

    label .burger::after {
        bottom: 0;
        transform-origin: bottom right;
        /* /起点を固定させる(起点右下) */
    }

    label .burger .bar {
        top: 45%;
    }

    #menu {
        width: 10%;
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        z-index: 2;
        display: flex;
        flex-flow: column nowrap;
        justify-content: center;
        align-items: flex-start;
    }

    #menu::before {
        position: absolute;
        top: 0;
        bottom: 0;
        right: 0;
        z-index: -1;
        width: 43rem;
        background-color: rgba(255, 255, 255, 0.9);
        content: "";
        transform: skewX(0deg) translateX(100%);
        transform-origin: bottom right;
        transition: transform 0.8s;
    }

    #menu a {
        margin: 0.71rem -355px;
        padding: 0.12rem 0.6rem;
        font-size: 1.0rem;
        font-family: 'Hiragino Kaku Gothic Pro', sans-serif;
        color: #808080;
        text-decoration: none;
        width: 25rem;
        transform: translateX(100%);
        transition: all 0.15s, transform 0.5s;
        transition-timing-function: cubic-bezier(0.-19, -1, -0.22, -1);
    }

    #hamburger:checked+label .burger::before,
    #hamburger:checked+label .burger::after {
        width: 130%;
    }

    #hamburger:checked+label .burger::before {
        transform: rotate(-45deg);
        left: -10px;
    }

    #hamburger:checked+label .burger::after {
        transform: rotate(45deg);
        left: -10px;
    }

    #hamburger:checked+label .burger .bar {
        transform: scale(0);
    }

    #hamburger:checked~#menu::before {
        transform: skewX(0deg) translateX(8%);
    }

    #hamburger:checked~#menu a {
        transform: translateX(0);
    }

    /* /タップされたら黒い背景が出る様にする */
    #hamburger:checked~.light-dark {
        background: #000;
        opacity: 0.5;
        width: 100%;
        height: 100%;
        position: fixed;
        top: 0;
        left: 0;
    }

    /* ハンバーガーメニュー */
</style>
</head>
<body>
<header><h1>Travel Itinerary</h1></header>
        <!-- ハンバーガーメニュー -->
        <input type="checkbox" id="hamburger">
        <label for="hamburger">
            <span class="burger">
                <span class="bar"></span>
            </span>
        </label>
        <label class="light-dark" for="hamburger"></label>
        <div id="menu">
            <a href="index2.html">2日</a>
            <a href="index3.html">3日</a>

        </div>
        <!-- ハンバーガーメニュー -->
<div id="container-wrapper">

<div class="controls">
<button onclick="addHome()">ホームを追加</button>
<button onclick="saveData()">データ保存</button>
<button onclick="loadData()">データ読み込み</button>
</div>

<div id="homes"></div>

</div>

<script>
let homeId=0;

function addHome(data={}){
homeId++;
let div=document.createElement('div');
div.className='home';
div.innerHTML=`
<div class="top-row">
  <div class="cell-third"><input placeholder="何分"></div>
  <div class="cell-third"><input placeholder="何円"></div>
  <div class="cell-third"><input placeholder="乗換回数"></div>
</div>

<div class="row white">
<div class="cell-left dark"><input type="time"></div>
<div class="cell-right"><input class="big" placeholder="⚪︎⚪︎駅"></div>
</div>

<div class="row light">
<div class="cell-left platform">
<input placeholder="何番ホーム">
<input placeholder="何番ホーム">
</div>
<div class="cell-right">
  <div class="time-fare">
    <input class="small" placeholder="何分">
    <input class="small" placeholder="何円">
  </div>
  <input placeholder="山手線">
  <input class="small" placeholder="⚪︎⚪︎方面">
</div>
</div>

<div class="row white">
<div class="cell-left dark">
<input type="time">
<input type="time">
</div>
<div class="cell-right">
<input class="big" placeholder="⚪︎⚪︎駅">
<input class="small" placeholder="乗換何分">
</div>
</div>

<div class="row light">
<div class="cell-left platform">
<input placeholder="何番ホーム">
<input placeholder="何番ホーム">
</div>
<div class="cell-right">
  <div class="time-fare">
    <input class="small" placeholder="何分">
    <input class="small" placeholder="何円">
  </div>
  <input placeholder="⚪︎⚪︎線">
  <input class="small" placeholder="⚪︎⚪︎方面">
</div>
</div>

<div class="row white">
<div class="cell-left dark"><input type="time"></div>
<div class="cell-right"><input class="big" placeholder="〇〇駅"></div>
</div>

<div class="row memo">
  <textarea class="memo-big" placeholder="メモ"></textarea>
  <textarea class="memo-small" placeholder="メモ２"></textarea>
</div>

<button onclick="this.parentElement.remove()">削除</button>
`;

document.getElementById('homes').appendChild(div);
}

function saveData(){
let data=[];
document.querySelectorAll('.home').forEach(home=>{
let inputs=home.querySelectorAll('input,textarea');
let values=[];
inputs.forEach(i=>values.push(i.value));
data.push(values);
});
localStorage.setItem('travelData',JSON.stringify(data));
alert('保存OK');
}

function loadData(){
let data=JSON.parse(localStorage.getItem('travelData'));
if(!data)return;
document.getElementById('homes').innerHTML='';
homeId=0;
data.forEach(d=>{
addHome();
let home=document.querySelectorAll('.home')[homeId-1];
let inputs=home.querySelectorAll('input,textarea');
inputs.forEach((i,index)=>i.value=d[index]||"");
});
}
</script>

</body>
</html>
