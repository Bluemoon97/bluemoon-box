<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Travel Itinerary</title>
<style>
body{font-family:sans-serif;margin:0;background:#f5f5f5}
header h1{
  background:#0e6d07;color:#fff;margin:0;padding:15px;font-size:20px}

.controls{
  display:flex;
  gap:10px;
  padding:10px;
  background:#f5f5f5; /* 薄グレー */
}
.controls button{
  flex:1;
  padding:12px;
  font-size:14px;
  background:#0e6d07;   /* ヘッダーと同じ緑 */
  color:#fff;           /* 文字白 */
  border:none;
  border-radius:6px;
  cursor:pointer;
  transition:0.2s;
}
/* ホバー（マウス乗せたとき） */
.controls button:hover{
  background:#095a05;   /* 少し濃くする */
}
.home{margin:10px;background:#fff;border-radius:10px;overflow:hidden}
#container-wrapper{ background:#fff; /* ←白にする */ }
.row{
  display:flex;
  border-bottom:1px solid #ddd;
  height:80px;              /* ←少し余裕ある高さに */
  align-items:stretch;      /* ←これ重要（中央揃えやめる） */
}
.row .platform input{
  display:block;
  height:22px;
  line-height:24px;
}
.row .platform input:nth-child(2){
  margin-top:4px;
}
.top-row{
  display:flex;
  height:80px;
  background:#f5f5f5;
}
.cell-third{
  width:33.33%;
  display:flex;
  align-items:center;
  justify-content:center;
}
.cell-left{
  width:33.33%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.cell-right{
  width:66.66%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:7px;   /* ←これで全部の間隔が広がる */
}
.cell-right div{
  line-height:1.2;
}
.dark input {
  color: #fff;
}
.dark input::placeholder {
  color: #ddd;
}
.dark{background:#555;color:#fff}
.platform{
  position: relative;
  gap:10px;   /* ←上下の間隔広げる（8〜12で調整OK） */
}
.platform::after{
  content:"";
  position:absolute;
  top:0;
  right:0;
  width:6px;
  height:100%;
  background:#ff5a2f; /* オレンジ×赤 */
}
.platform input{
  display:block;
  height:24px;              /* ←高さ固定 */
  line-height:24px;
}
.platform input:nth-child(2){
  margin-top: 4px;
}
.time-group input{
  height:24px;
}
.dark input[type="time"]{
  color:#fff;
  font-size:16px;
  -webkit-text-fill-color:#fff;
}
input[type="time"]{
  border:none;
  background:transparent;
  font-size:16px;   /* ←少し小さめに */
  height:40px;      /* ←高さ統一（重要） */
}

input::placeholder {
  color: #999;
}
.dark input::placeholder {
  color: #ccc;
}
input::-webkit-input-placeholder {
  color: #999;
}
.dark input::-webkit-input-placeholder {
  color: #ccc;
}
.white{background:#fff}
.light{background:#eee}

.time-fare{
  display:flex;
  gap:6px;
}
.time-fare input{
  flex:1;
  text-align:left;   /* ←左寄せ */
  padding-left:6px;  /* ←少し余白つけると見やすい */
}
input{width:75%;border:none;background:transparent;font-size:16px}
.small{font-size:12px}
.big{font-size:18px;font-weight:bold}

textarea{width:100%;border:none}
.big{
  font-size:20px;
  font-weight:bold;
  letter-spacing:1px;   /* ちょい広げる */
}
.memo{
  display:flex;
  flex-direction:column;  /* ←縦並び強制 */
  width:100%;
  padding:8px;
}
.memo textarea{
  width:100%;
  box-sizing:border-box;   /* ←これ超重要 */
  display:block;
  margin-bottom:8px;
  border:1px solid #ccc;
  border-radius:6px;
  padding:8px;
}
.memo textarea:last-child{
  margin-bottom:0;
}
.memo-big{
  font-size:15px;
}
.memo-small{
  font-size:12px;
  color:#666;
}
.row.memo{
  width:100%;
  background:#f5f5f5;     /* ←薄いグレー背景 */
  border:1px solid #ccc;  /* ←外枠 */
  border-radius:6px;
  padding:8px;
  box-sizing:border-box;
}

   /* ハンバーガーメニュー */
    #hamburger {
        opacity: 0;
        position: fixed;
    }

    label .burger {
        position: fixed;
        top: 1.6rem;
        right: 1rem;
        z-index: 3;
        width: 1.5rem;
        height: 1.6rem;
    }

    label .burger::before,
    label .burger::after,
    label .burger .bar {
        position: absolute;
        left: 0;
        width: 100%;
        height: 0.25rem;
        border-radius: 5px;
        background-color: #808080;
        content: "";
        transition: all 0.5s;
    }

    label .burger::before {
        top: 0;
        transform-origin: top right;
        /* /起点を固定させる(起点右上) */
    }

    label .burger::after {
        bottom: 0;
        transform-origin: bottom right;
        /* /起点を固定させる(起点右下) */
    }

    label .burger .bar {
        top: 45%;
    }

    #menu {
        width: 10%;
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        z-index: 2;
        display: flex;
        flex-flow: column nowrap;
        justify-content: center;
        align-items: flex-start;
    }

    #menu::before {
        position: absolute;
        top: 0;
        bottom: 0;
        right: 0;
        z-index: -1;
        width: 43rem;
        background-color: rgba(255, 255, 255, 0.9);
        content: "";
        transform: skewX(0deg) translateX(100%);
        transform-origin: bottom right;
        transition: transform 0.8s;
    }

    #menu a {
        margin: 0.71rem -355px;
        padding: 0.12rem 0.6rem;
        font-size: 1.0rem;
        font-family: 'Hiragino Kaku Gothic Pro', sans-serif;
        color: #808080;
        text-decoration: none;
        width: 25rem;
        transform: translateX(100%);
        transition: all 0.15s, transform 0.5s;
        transition-timing-function: cubic-bezier(0.-19, -1, -0.22, -1);
    }

    #hamburger:checked+label .burger::before,
    #hamburger:checked+label .burger::after {
        width: 130%;
    }

    #hamburger:checked+label .burger::before {
        transform: rotate(-45deg);
        left: -10px;
    }

    #hamburger:checked+label .burger::after {
        transform: rotate(45deg);
        left: -10px;
    }

    #hamburger:checked+label .burger .bar {
        transform: scale(0);
    }

    #hamburger:checked~#menu::before {
        transform: skewX(0deg) translateX(8%);
    }

    #hamburger:checked~#menu a {
        transform: translateX(0);
    }

    /* /タップされたら黒い背景が出る様にする */
    #hamburger:checked~.light-dark {
        background: #000;
        opacity: 0.5;
        width: 100%;
        height: 100%;
        position: fixed;
        top: 0;
        left: 0;
    }



    #menu .fav-add{
       margin-top:20px;
       padding:10px;
    }

    #menu .fav-add input{
       width:90%;
       margin-bottom:6px;
       padding:6px;
    }

    #menu .fav-add button{
       padding:6px 10px;
    }

    #fav-list a{
       display:block;
       margin:5px 0;
       color:#333;
       text-decoration:none;
    }


    #fav-list a{
       margin: 0.71rem -355px;
       padding: 0.12rem 0.6rem;
       font-size: 1.0rem;
       color: #808080;
       text-decoration: none;
       width: 25rem;

       transform: translateX(100%);   /* ←これで最初は隠れる */
       transition: all 0.15s, transform 0.5s;
    }
    #menu .fav-add{
       margin: 0.71rem -355px;
       padding: 0.12rem 0.6rem;
       width: 25rem;

       transform: translateX(100%);
       transition: all 0.15s, transform 0.5s;
    }
    #hamburger:checked ~ #menu .fav-add{
       transform: translateX(0);
    }
    
    /* ハンバーガーメニュー */
</style>
</head>
<body>
<header><h1>Travel Itinerary</h1></header>
        <!-- ハンバーガーメニュー -->
        <input type="checkbox" id="hamburger">
        <label for="hamburger">
            <span class="burger">
                <span class="bar"></span>
            </span>
        </label>
        <label class="light-dark" for="hamburger"></label>
        <div id="menu">
            <a href="index2.html">2日</a>
            <a href="index3.html">3日</a>
            <a href="http://www.urbanhotel-kajimachi.jp/" target="_blank">アーバンホテルかじまち</a>
            <a href="https://travel.yahoo.co.jp/kanko/prefecture-fukuoka/area-kokura/" target="_blank">2026年人気の観光・お出かけスポット30選</a>
            <a href="https://www.tabirai.net/localinfo/article/article-50691/" target="_blank">北九州・小倉観光で巡りたい名所10選をご紹介</a>
            <a href="https://asanoshiokaze-park.com/" target="_blank">あきの汐風公演</a>
            
            <div id="fav-list"></div>   <!-- ←先にこれ -->
            <div class="fav-add">
                <input id="fav-name" placeholder="名前">
                <input id="fav-url" placeholder="URL (https://...)">
            <button onclick="addFavorite()">追加</button>
            </div>


        </div>
        <!-- ハンバーガーメニュー -->
<div id="container-wrapper">

<div class="controls">
<button onclick="addHome()">ホームを追加</button>
<button onclick="saveData()">データ保存</button>
<button onclick="loadData()">データ読み込み</button>
</div>

<div id="homes"></div>

</div>

<script>
let homeId=0;

function addHome(data={}){
homeId++;
let div=document.createElement('div');
div.className='home';
div.innerHTML=`
<div class="top-row">
  <div class="cell-third"><input placeholder="何分"></div>
  <div class="cell-third"><input placeholder="何円"></div>
  <div class="cell-third"><input placeholder="乗換回数"></div>
</div>

<div class="row white time-block">
<div class="cell-left dark">
  <input type="time" class="start-time">
</div>
<div class="cell-right">
  <input class="big" placeholder="⚪︎⚪︎駅">
  <input class="minutes" placeholder="分">
</div>
</div>

<div class="row light">
<div class="cell-left platform">
<input placeholder="何番ホーム">
<input placeholder="何番ホーム">
</div>
<div class="cell-right">
  <div class="time-fare">
    <input class="small" placeholder="何分">
    <input class="small" placeholder="何円">
  </div>
  <input placeholder="⚪︎⚪︎線">
  <input class="small" placeholder="⚪︎⚪︎方面">
</div>
</div>

<div class="row white time-block">
<div class="cell-left dark">
  <input type="time" class="start-time">
  <input type="time" class="arrival-time">
</div>
<div class="cell-right">
  <input class="big" placeholder="⚪︎⚪︎駅">
  <input class="minutes" placeholder="分">
</div>
</div>

<div class="row light">
<div class="cell-left platform">
<input placeholder="何番ホーム">
<input placeholder="何番ホーム">
</div>
<div class="cell-right">
  <div class="time-fare">
    <input class="small" placeholder="何分">
    <input class="small" placeholder="何円">
  </div>
  <input placeholder="⚪︎⚪︎線">
  <input class="small" placeholder="⚪︎⚪︎方面">
</div>
</div>

<div class="row white time-block">
<div class="cell-left dark">
  <input type="time" class="arrival-time">
</div>
<div class="cell-right">
  <input class="big" placeholder="〇〇駅">
</div>
</div>

<div class="row memo">
  <textarea class="memo-big" placeholder="メモ"></textarea>
  <textarea class="memo-small" placeholder="メモ２"></textarea>
</div>

<button onclick="this.parentElement.remove()">削除</button>
`;

document.getElementById('homes').appendChild(div);

// 👇これが超重要
  setup();
}

function saveData(){
let data=[];
document.querySelectorAll('.home').forEach(home=>{
let inputs=home.querySelectorAll('input,textarea');
let values=[];
inputs.forEach(i=>values.push(i.value));
data.push(values);
});
localStorage.setItem('travelData',JSON.stringify(data));
alert('保存OK');
}

function loadData(){
  let data=JSON.parse(localStorage.getItem('travelData'));
  if(!data)return;

  document.getElementById('homes').innerHTML='';
  homeId=0;

  data.forEach(d=>{
    addHome();
    let home=document.querySelectorAll('.home')[homeId-1];
    let inputs=home.querySelectorAll('input,textarea');
    inputs.forEach((i,index)=>i.value=d[index]||"");
  });

  // 👇ここ1回だけでOK
  setup();
}


// =====================
// 時間自動計算
// =====================
function calculateTime(block){
  const start = block.querySelector(".start-time");
  const minutes = block.querySelector(".minutes");
  const arrival = block.querySelector(".arrival-time");

  if(!minutes) return;

  const m = parseInt(minutes.value);
  if(isNaN(m)) return;

  // =====================
  // ① 出発 → 到着（優先）
  // =====================
  if(start && start.value){
    const [h, min] = start.value.split(":").map(Number);
    const date = new Date();
    date.setHours(h);
    date.setMinutes(min + m);

    const hh = String(date.getHours()).padStart(2, '0');
    const mm = String(date.getMinutes()).padStart(2, '0');

    if(arrival) arrival.value = `${hh}:${mm}`;

    const next = block.nextElementSibling;
    if(next){
      const nextStart = next.querySelector(".start-time");
      if(nextStart && !nextStart.value){
        nextStart.value = `${hh}:${mm}`;
      }
    }

  
    return; // 🔥 これが超重要
  }

  // =====================
  // ② 到着 → 次の出発
  // =====================
  if(arrival && arrival.value){
  const [h, min] = arrival.value.split(":").map(Number);
  const date = new Date();
  date.setHours(h);
  date.setMinutes(min + m);

  const hh = String(date.getHours()).padStart(2, '0');
  const mm = String(date.getMinutes()).padStart(2, '0');

  // 次のブロック取得
  const next = block.nextElementSibling;

  // nextStart を外でも使えるように宣言
  let nextStart = null;

  if(next){
    nextStart = next.querySelector(".start-time");
    if(nextStart && !nextStart.value){
      nextStart.value = `${hh}:${mm}`;
    }
  }

  // =====================
  // 乗車時間（今の区間）＝ arrival - start
  // =====================
  if(start && start.value){
    const [sh, sm] = start.value.split(":").map(Number);
    const [ah, am] = arrival.value.split(":").map(Number);

    let diff = (ah*60 + am) - (sh*60 + sm);
    if(diff < 0) diff += 24*60;

    // 今の time-block の次にある light 行に入れる
    if(next && next.classList.contains("light")){
      const minuteInput = next.querySelector(".time-fare input:first-child");
      if(minuteInput){
        minuteInput.value = diff;
      }
    }
  }
}

}
function setup(){
  document.querySelectorAll(".time-block").forEach(block=>{
    const start = block.querySelector(".start-time");
    const minutes = block.querySelector(".minutes");
    const arrival = block.querySelector(".arrival-time");

    if(start) start.addEventListener("input", ()=>calculateTime(block));
    if(minutes) minutes.addEventListener("input", ()=>calculateTime(block));
    if(arrival) arrival.addEventListener("input", ()=>calculateTime(block));
  });
}

// 初回読み込み
document.addEventListener("DOMContentLoaded", setup);
</script>


<script>
function addFavorite(){
  const name = document.getElementById("fav-name").value;
  const url = document.getElementById("fav-url").value;

  if(!name || !url) return;

  let data = JSON.parse(localStorage.getItem("favorites") || "[]");

  data.push({name, url});
  localStorage.setItem("favorites", JSON.stringify(data));

  renderFavorites();
}

function renderFavorites(){
  const list = document.getElementById("fav-list");
  list.innerHTML = "";

  let data = JSON.parse(localStorage.getItem("favorites") || "[]");

  data.forEach(fav=>{
    const a = document.createElement("a");
    a.textContent = fav.name;
    a.href = fav.url;
    a.target = "_blank";  // ←新しいタブ
    list.appendChild(a);
  });
}

// 初回読み込み
document.addEventListener("DOMContentLoaded", renderFavorites);
</script>


<script>
function addFavorite(){
  const name = document.getElementById("fav-name").value;
  const url = document.getElementById("fav-url").value;

  if(!name || !url) return;

  let data = JSON.parse(localStorage.getItem("favorites") || "[]");

  data.push({name, url});
  localStorage.setItem("favorites", JSON.stringify(data));

  // 入力欄クリア（おまけ）
  document.getElementById("fav-name").value = "";
  document.getElementById("fav-url").value = "";

  renderFavorites();
}

function renderFavorites(){
  const list = document.getElementById("fav-list");
  list.innerHTML = "";

  let data = JSON.parse(localStorage.getItem("favorites") || "[]");

  data.forEach((fav, index)=>{
    const div = document.createElement("div");

    const a = document.createElement("a");
    a.textContent = fav.name;
    a.href = fav.url;
    a.target = "_blank";

    const btn = document.createElement("button");
    btn.textContent = "×";
    btn.style.marginLeft = "10px";

    btn.onclick = ()=>{
      data.splice(index,1);
      localStorage.setItem("favorites", JSON.stringify(data));
      renderFavorites();
    };

    div.appendChild(a);
    div.appendChild(btn);
    list.appendChild(div);
  });
}

// 初回読み込み
document.addEventListener("DOMContentLoaded", renderFavorites);
</script>
