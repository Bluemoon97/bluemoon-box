<style>
body{font-family:sans-serif;margin:0;background:#f5f5f5}
header h1{

.controls{

.home{margin:10px;background:#fff;border-radius:10px;overflow:hidden}
#container-wrapper{ background:#fff; /* ←白にする */ }
.row{

  height:80px;              /* ←少し余裕ある高さに */

.row .platform input{
  display:block;
  height:22px;

}
.row .platform input:nth-child(2){

.top-row{

.cell-third{

  align-items:center;
  justify-content:center;
}
.cell-left{

  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.cell-right{
  width:66.66%;
  height:100%;

  justify-content:center;

.cell-right div{

}
.dark input {
  color: #fff;
}
.dark input::placeholder {
  color: #ddd;
}
.dark{background:#555;color:#fff}
.platform{
  position: relative;
  gap:10px;   /* ←上下の間隔広げる（8〜12で調整OK） */
}
.platform::after{
  content:"";
  position:absolute;
  top:0;
  right:0;
  width:6px;
  height:100%;

.platform input{
  display:block;

}
.platform input:nth-child(2){

}
.time-group input{
  height:24px;
}
.dark input[type="time"]{

  font-size:16px;
  -webkit-text-fill-color:#fff;
}
input[type="time"]{
  border:none;
  background:transparent;
  font-size:16px;   /* ←少し小さめに */
  height:40px;      /* ←高さ統一（重要） */
}

input::placeholder {
  color: #999;
}
.dark input::placeholder {
  color: #ccc;
}
input::-webkit-input-placeholder {
  color: #999;
}
.dark input::-webkit-input-placeholder {
  color: #ccc;
}
.white{background:#fff}
.light{background:#eee}

.time-fare{
  display:flex;
  gap:6px;
}
.time-fare input{
  flex:1;
  text-align:left;   /* ←左寄せ */

}
input{width:75%;border:none;background:transparent;font-size:16px}
.small{font-size:12px}
.big{font-size:18px;font-weight:bold}

textarea{width:100%;border:none}
.big{
  font-size:20px;
  font-weight:bold;
  letter-spacing:1px;   /* ちょい広げる */
}
.memo{
  display:flex;
  flex-direction:column;  /* ←縦並び強制 */
  width:100%;
  padding:8px;
}
.memo textarea{
  width:100%;
  box-sizing:border-box;   /* ←これ超重要 */
  display:block;
  margin-bottom:8px;
  border:1px solid #ccc;
  border-radius:6px;
  padding:8px;
}
.memo textarea:last-child{
  margin-bottom:0;
}
.memo-big{
  font-size:15px;
}
.memo-small{
  font-size:12px;
  color:#666;
}
.row.memo{
  width:100%;
  background:#f5f5f5;     /* ←薄いグレー背景 */
  border:1px solid #ccc;  /* ←外枠 */
  border-radius:6px;
  padding:8px;
  box-sizing:border-box;
}

.navitime-btn {
  background-color: #0e6d07;   /* 背景色 */
  color: white;              /* 文字色 */

  width: 100%;              /* 横幅 */
  height: 47px;              /* 高さ */

  font-size: 14px;           /* 文字サイズ */
  border: none;
  border-radius: 6px;

  margin-top: 10px;          /* 上下位置 */
  margin-left: 0px;          /* 左右位置 */

  cursor: pointer;
}


/* 反転フラップ式(パタパタ表示) */
.flap {
  font-size: 20px;
  font-family: monospace;
  /* background: black; */
  color: lime;
  padding: 10px;
  display: inline-block;
  transition: transform 0.2s;
}

/* 反転フラップ式(パタパタ表示)追加コード */
.flap-board {
  position: relative;

  width: 260px;
  height: 60px;

  margin: -26px 0 0 0;

  perspective: 1000px;

  font-family: monospace;
  font-size: 20px;
  font-weight: bold;
  letter-spacing: 3px;

  color: white;

  background: transparent;

  overflow: visible;

  flex-shrink: 0;
}

/* 上半分 */
.flap-top {

  position: absolute;

  top: 0;
  left: 0;

  width: 100%;
  height: 50%;

  background: #2f2f2f;

  color: white;

  display: flex;

  align-items: center;
  justify-content: center;

  box-sizing: border-box;

  overflow: hidden;

  transform-origin: bottom;

  backface-visibility: hidden;

  z-index: 2;

  border-bottom: 2px solid #000;

  line-height: 1;
}

/* 下半分 */
.flap-bottom {

  position: absolute;

  bottom: 0;
  left: 0;

  width: 100%;
  height: 50%;

  background: #1c1c1c;

  color: white;

  display: flex;

  align-items: center;
  justify-content: center;

  box-sizing: border-box;

  overflow: visible;

  line-height: 1;

  transform-origin: top;

  backface-visibility: hidden;

  z-index: 1;
}

/* パタパタ */
.flip .flap-top {
  animation: flipTop 0.25s ease-in;
}

.flip .flap-bottom {
  animation: flipBottom 0.25s ease-out forwards;
}

@keyframes flipTop {
  0% {
    transform: rotateX(0deg);
  }

  100% {
    transform: rotateX(-90deg);
  }
}

@keyframes flipBottom {
  0% {
    transform: rotateX(90deg);
  }

  100% {
    transform: rotateX(0deg);
  }
}

/* 文字本体 */
.flap-text {

  position: absolute;

  left: 0;

  width: 100%;

  text-align: center;

  font-size: min(42px, 4.2vw);

  font-weight: bold;

  color: white;

  line-height: 1;

  font-family: sans-serif;

  white-space: nowrap;

  transform: scaleX(0.9);
}

/* 上半分用 */
.top-text {

  top: 18px;
}

/* 下半分用 */
.bottom-text {

  top: -12px;
}

.cell-right {

  display: flex;

  flex-direction: column;

  justify-content: center;

  gap: 6px;

  min-height: 120px;

  overflow: visible;

}

#toStation {

background: #f5f5f5;

  
}

}

.flap-sound-btn {

/* ここまで追加コード */

   /* ハンバーガーメニュー */
    #hamburger {
        opacity: 0;
        position: fixed;
    }

    label .burger {
        position: fixed;
        top: 1.6rem;
        right: 1rem;
        z-index: 3;
        width: 1.5rem;
        height: 1.6rem;
    }

    label .burger::before,
    label .burger::after,
    label .burger .bar {
        position: absolute;
        left: 0;
        width: 100%;
        height: 0.25rem;
        border-radius: 5px;
        background-color: #808080;
        content: "";
        transition: all 0.5s;
    }

    label .burger::before {
        top: 0;
        transform-origin: top right;
        /* /起点を固定させる(起点右上) */
    }

    label .burger::after {
        bottom: 0;
        transform-origin: bottom right;
        /* /起点を固定させる(起点右下) */
    }

    label .burger .bar {
        top: 45%;
    }

    #menu {
        width: 10%;
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        z-index: 2;
        display: flex;
        flex-flow: column nowrap;
        justify-content: center;
        align-items: flex-start;
    }

    #menu::before {
        position: absolute;
        top: 0;
        bottom: 0;
        right: 0;
        z-index: -1;
        width: 43rem;     /* ←変更前 43rem;*/
        background-color: rgba(255, 255, 255, 0.9);
        content: "";
        transform: skewX(0deg) translateX(100%);
        transform-origin: bottom right;
        transition: transform 0.8s;
    }

    #menu a {
        margin: -0.12rem -345px;     /* ←縦の余白だけ小さくする -0.12remの方*/
        padding: 0.12rem 0.6rem;
        font-size: 1.0rem;
        font-family: 'Hiragino Kaku Gothic Pro', sans-serif;
        color: #808080;
        text-decoration: none;
        width: 25rem;
        display: block;
        padding-right: 0;
        transform: translateX(100%);
        transition: all 0.15s, transform 0.5s;
        transition-timing-function: cubic-bezier(0.-19, -1, -0.22, -1);
    }
    
    #menu > a{
        margin-bottom: 2.5px;    /* ←2日3日の隙間調整する */
        pointer-events: none;
    }

    #menu > a span{
        pointer-events: auto;
        cursor: pointer;
    }

    #hamburger:checked+label .burger::before,
    #hamburger:checked+label .burger::after {
        width: 130%;
    }

    #hamburger:checked+label .burger::before {
        transform: rotate(-45deg);
        left: -10px;
    }

    #hamburger:checked+label .burger::after {
        transform: rotate(45deg);
        left: -10px;
    }

    #hamburger:checked+label .burger .bar {
        transform: scale(0);
    }

    #hamburger:checked~#menu::before {
        transform: skewX(0deg) translateX(8%);
    }

    #hamburger:checked~#menu a {
        transform: translateX(0);
    }

    /* /タップされたら黒い背景が出る様にする */
    #hamburger:checked~.light-dark {
        background: #000;
        opacity: 0.5;
        width: 100%;
        height: 100%;
        position: fixed;
        top: 0;
        left: 0;
    }



    #menu .fav-add{
       margin-top:20px;
       padding:10px;
    }

    /* 隙間調整margin-bottom */
    #menu .fav-add input{
       width:67%;
       margin-bottom:-4px;
       padding:6px;
    }

    /* 隙間調整margin-top */
    #menu .fav-add button{
       margin-top: 7px;
       padding:6px 10px;
    }



    #fav-list a{
       margin: 0.71rem -355px;
       padding: 0.12rem 0.6rem;
       font-size: 1.0rem;
       color: #808080;
       text-decoration: none;
       width: auto;
       display: inline-block;

       transform: translateX(100%);   /* ←これで最初は隠れる */
       transition: all 0.15s, transform 0.5s;
    }
    #menu .fav-add{
       margin: 0.71rem -355px;
       padding: 0.12rem 0.6rem;
       width: 25rem;

       transform: translateX(100%);
       transition: all 0.15s, transform 0.5s;

       display:flex;
       flex-direction:column;
       align-items:flex-start;
    }
    #hamburger:checked ~ #menu .fav-add{
       transform: translateX(0);
    }
    
    /* 隙間狭くする */
    #fav-list{
      margin-top: 2px;
   }

   #fav-list div{
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      margin: -15px 0;
   }

   #fav-list button{
      margin: -15px 0 0 0;
      padding: 0;
      line-height: 1;
   }

   /* ×ボタン通常は非表示 */
   #fav-list button{
      display: none;
   }

   /* ×ボタンメニュー開いたら表示 */
   #hamburger:checked ~ #menu #fav-list button{
      display: block;
   }
   
   .fav-text.done{
      opacity:0.35;
      text-decoration: line-through;
    }

   .fav-check{
      display:none;
      align-items:center;
      gap:6px;              /* ハンバーガーメニュー名前とチェックの隙間変更 */
   }

   .fav-check input{

      top: -40px;

   }

   #hamburger:checked ~ #menu .fav-check{
      display:flex;
   }

   @media screen and (orientation: landscape) {
   #menu::before{
      width: 60rem;
   }

}
     /* ハンバーガーメニュー*/
</style>

function saveData(){
let data=[];
document.querySelectorAll('.home').forEach(home=>{
let inputs=home.querySelectorAll('input,textarea');
let values=[];

inputs.forEach(i=>values.push(i.value));

// パタパタ駅名も保存
values.push(
  home.querySelector("#fromStation .top-text")
    ?.textContent || ""
);

values.push(
  home.querySelector("#transferStation .top-text")
    ?.textContent || ""
);

values.push(
  home.querySelector("#toStation .top-text")
    ?.textContent || ""
);

data.push(values);
});
localStorage.setItem('travelData_day1',JSON.stringify(data));
alert('保存OK');
}

function loadData(){
  let data=JSON.parse(localStorage.getItem('travelData_day1'));
  if(!data)return;

  document.getElementById('homes').innerHTML='';
  homeId=0;

  data.forEach(d=>{
    addHome();

// =====================
// 時間自動計算
// =====================
function calculateTime(block){
  const start = block.querySelector(".start-time");
  const minutes = block.querySelector(".minutes");
  const arrival = block.querySelector(".arrival-time");

  if(!minutes) return;

  const m = parseInt(minutes.value);
  if(isNaN(m)) return;

  // =====================
  // ① 出発 → 到着（優先）
  // =====================
  if(start && start.value){
    const [h, min] = start.value.split(":").map(Number);
    const date = new Date();
    date.setHours(h);
    date.setMinutes(min + m);

    const hh = String(date.getHours()).padStart(2, '0');
    const mm = String(date.getMinutes()).padStart(2, '0');

    if(arrival) arrival.value = `${hh}:${mm}`;

    const next = block.nextElementSibling;
    if(next){
      const nextStart = next.querySelector(".start-time");
      if(nextStart && !nextStart.value){
        nextStart.value = `${hh}:${mm}`;
      }
    }

  
    return; // 🔥 これが超重要
  }

  // =====================
  // ② 到着 → 次の出発
  // =====================
  if(arrival && arrival.value){
  const [h, min] = arrival.value.split(":").map(Number);
  const date = new Date();
  date.setHours(h);
  date.setMinutes(min + m);

  const hh = String(date.getHours()).padStart(2, '0');
  const mm = String(date.getMinutes()).padStart(2, '0');

  // 次のブロック取得
  const next = block.nextElementSibling;

  // nextStart を外でも使えるように宣言
  let nextStart = null;

  if(next){
    nextStart = next.querySelector(".start-time");
    if(nextStart && !nextStart.value){
      nextStart.value = `${hh}:${mm}`;
    }
  }

  // =====================
  // 乗車時間（今の区間）＝ arrival - start
  // =====================
  if(start && start.value){
    const [sh, sm] = start.value.split(":").map(Number);
    const [ah, am] = arrival.value.split(":").map(Number);

    let diff = (ah*60 + am) - (sh*60 + sm);
    if(diff < 0) diff += 24*60;

    // 今の time-block の次にある light 行に入れる
    if(next && next.classList.contains("light")){
      const minuteInput = next.querySelector(".time-fare input:first-child");
      if(minuteInput){
        minuteInput.value = diff;
      }
    }
  }
}

}
function setup(){
  document.querySelectorAll(".time-block").forEach(block=>{
    const start = block.querySelector(".start-time");
    const minutes = block.querySelector(".minutes");
    const arrival = block.querySelector(".arrival-time");

    if(start) start.addEventListener("input", ()=>calculateTime(block));
    if(minutes) minutes.addEventListener("input", ()=>calculateTime(block));
    if(arrival) arrival.addEventListener("input", ()=>calculateTime(block));
  });
}

// 初回読み込み
document.addEventListener("DOMContentLoaded", setup);
</script>


<script>
function addFavorite(){
  const name = document.getElementById("fav-name").value;
  const url = document.getElementById("fav-url").value;

  if(!name || !url) return;

  let data = JSON.parse(localStorage.getItem("favorites_day1") || "[]");

  data.push({name, url});
  localStorage.setItem("favorites_day1", JSON.stringify(data));

  // 入力欄クリア（おまけ）
  document.getElementById("fav-name").value = "";
  document.getElementById("fav-url").value = "";

  renderFavorites();
}

function renderFavorites(){
  const list = document.getElementById("fav-list");
  list.innerHTML = "";

  let data = JSON.parse(localStorage.getItem("favorites_day1") || "[]");

  data.forEach((fav, index)=>{
    const div = document.createElement("div");

    const label = document.createElement("label");
    label.className = "fav-check";

    const check = document.createElement("input");
    check.type = "checkbox";

    const span = document.createElement("span");
    span.className = "fav-text";

    const a = document.createElement("a");
    a.textContent = fav.name;
    a.href = fav.url;
    a.target = "_blank";

    span.appendChild(a);

    check.onchange = ()=>{
    span.classList.toggle("done");

    if(check.checked){
      a.style.pointerEvents = "none";
      a.style.opacity = "0.5";
    }else{
      a.style.pointerEvents = "auto";
      a.style.opacity = "1";
    }
  };
    label.appendChild(check);
    label.appendChild(span);

    const btn = document.createElement("button");
    btn.textContent = "×";
    btn.style.fontSize = "12px";
    btn.style.marginLeft = "-2px";
    btn.style.position = "relative";
    btn.style.top = "-3px";

    btn.onclick = ()=>{
      data.splice(index,1);
      localStorage.setItem("favorites_day1", JSON.stringify(data));
      renderFavorites();
    };

    div.appendChild(label);
    div.appendChild(btn);
    list.appendChild(div);
  });
}

// 初回読み込み
document.addEventListener("DOMContentLoaded", renderFavorites);
</script>

    window.selectedFrom = station;

  if (type === "to") {

    document.getElementById("searchTo").value = station.name;
    document.getElementById("toCandidates").innerHTML = "";
  }
}

function flapUpdate(id, text) {

  const board =
    document.getElementById(id);

  if (!board) return;

  // flip解除
  board.classList.remove("flip");

  // 上下板生成
  board.innerHTML = `
  <div class="flap-top">
    <span class="flap-text top-text">
      ${text}
    </span>
  </div>

  <div class="flap-bottom">
    <span class="flap-text bottom-text">
      ${text}
    </span>
  </div>
`;

  // 再描画

  board.classList.add("flip");
}

    ?.textContent || "----";

const transferName =
  home.querySelector("#transferStation .top-text")
    ?.textContent || "----";

const toName =
  home.querySelector("#toStation .top-text")
    ?.textContent || "----";

  // パタパタ音
  const audio = new Audio(
  "Split-flap_display.mp3"
);

audio.volume = 0.25;

audio.loop = true;

audio.play().catch(() => {});
  
  let i = 0;

  const interval = setInterval(() => {

    updateHomeFlap(
      home,
      "fromStation",
      stations[
        Math.floor(Math.random() * stations.length)
      ]
    );

    updateHomeFlap(
      home,
      "transferStation",
      stations[
        Math.floor(Math.random() * stations.length)
      ]
    );

    updateHomeFlap(
      home,
      "toStation",
      stations[
        Math.floor(Math.random() * stations.length)
      ]
    );

    // 音
    

    i++;

    if (i >= 20) {

      clearInterval(interval);

      setTimeout(() => {

        flapUpdate(
          "fromStation",
          fromName
        );

        flapUpdate(
          "transferStation",
          transferName
        );

        flapUpdate(
          "toStation",
          toName
        );

        // 音を止める
        audio.pause();
        audio.currentTime = 0;

      }, 200);

    }

  }, 120);

}
</script>

</body>
</html>
