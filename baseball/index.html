<!DOCTYPE html>
<html lang="ja">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>阪神タイガースオーダー入力</title>
 <style>
   body {
     font-family: sans-serif;
     margin: 0;
     background-color: #f0f0f0;
   }

   .container {
     position: relative;
     max-width: none;
     width: 100%;
     margin: auto;
     background-color: #222;
   }

   .field-image {
     width: 100%;
     max-width:100%;
     height: auto;
     display: block;
   }

   .position-label {
     width:80px;
     height:10px;
     display:flex;
     align-items:center;
     justify-content:center;
     position:absolute;
     background:black;
     color:white;
     border:2px solid #666;
     padding:6px 10px;
     font-size:18px;
     font-weight:bold;
     white-space:nowrap;
     overflow:hidden;
     text-align:center;
     text-overflow:ellipsis;
     transform:translate(-50%,-50%);
     font-family:
       "Yu Mincho",
       "MS Mincho",
       serif;
   }

   .input-area {
     display: flex;
     flex-direction: row;
     justify-content: center;
     align-items: flex-start;
     padding: 20px;
     flex-wrap: wrap;
     gap: 40px;
   }

   .order, .pitchers {
     background:#111;
     border:4px solid #444;
     padding:15px;
     border-radius:0;
     box-shadow:none;
     color:white;
   }

   .order {
     flex: 1 1 300px;
     width: 100%;
   }

   .pitchers {
     flex: 1 1 200px;
     width: 100%;
   }

   h2 {
     margin-top:0;
     text-align:center;
     color:white;
     font-size:24px;
     letter-spacing:3px;
     border-bottom:2px solid #777;
     padding-bottom:10px;
   }

   .pitcher-item {
     display:flex;
     gap:10px;
     margin-bottom:10px;
     align-items:center;
   }

   .order-item{
     display:inline-flex;
     flex-direction:column;
     width:80px;
     margin:0 4px;
     vertical-align:top;
   }

   .position-select,
   .player-select{
     display:block !important;
     width:100%;
   }

   .player-select{
     writing-mode:vertical-rl;
     text-orientation:upright;
     height:180px;
     width:70px;
     font-size:24px;
   }

   select {
     background:#000;
     color:#fff;
     border:2px solid #666;
     font-size:20px;
     font-weight:bold;
     font-family:
     "Yu Mincho",
     serif;
     height:50px;
     border-radius:0;
     -webkit-appearance:none;
     appearance:none;
   }

   label {
     min-width: 50px;
     font-weight: bold;
     font-size: 14px;
   }

   .batting-order{
     display:inline-block;
     width:50px;
     height:50px;
     line-height:50px;
     text-align:center;
     background:black;
     color:white;
     border:2px solid #666;
     font-size:28px;
     font-weight:bold;
     padding:0;
   }

   .flip-name{
     animation: flipBoard 0.6s ease;
   }

   @keyframes flipBoard{

     0%{
       transform:
         translate(-50%,-50%)
         rotateY(0deg);
     }
     50%{
       transform:
         translate(-50%,-50%)
         rotateY(90deg);
     }
     100%{
       transform:
         translate(-50%,-50%)
         rotateY(0deg);
     }
   }

   body{
     background:#222;
   }
   .input-area{
     background:#222;
   }
   .order-item,
   .pitcher-item{
     border-bottom:1px solid #555;
     padding:6px 0;
   }

   .order,
   .pitchers,
   .position-label{

     font-family:
     "Yu Mincho",
     "Hiragino Mincho ProN",
     serif;

     letter-spacing:2px;
   }

   .koshien-header{
     display:none;
     grid-template-columns:
       60px
       120px
       1fr;
     color:white;
     font-size:24px;
     margin-bottom:15px;
     text-align:center;
     font-weight:bold;
   }

   #koshien-preview{
    display: none;
  }

  .preview-column{
    width:55px;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
  }

  .preview-order{
    font-size:30px;
    font-weight:bold;
    margin-bottom:8px;
  }
  
  .preview-name{
    writing-mode:vertical-rl;
    text-orientation:upright;
    white-space:nowrap;
    overflow:hidden;
    font-size:20px;
    height:170px;
    line-height:1;
    margin:8px 0;
    letter-spacing:2px;
  }
  
  .preview-pos{
    font-size:30px;
    font-weight:bold;
    margin-top:8px;
  }


  #koshien-board{
    display:flex;
    justify-content:flex-start;
    gap:4px;
    padding:10px 4px;
    overflow-x:auto;
    width:100%;
    box-sizing:border-box;
  }

  .board-column{
    width:48px;
    text-align:center;
  }

  .board-order{
    color:white;
    font-size:42px;
    font-weight:bold;
    margin-bottom:10px;
  }

  .board-player{
    width:48px;
    height:120px;
    writing-mode:vertical-rl;
    text-orientation:center;
    background:black;
    color:white;
    border:2px solid #666;
    font-size:18px;
    margin:auto;
  }

  .board-pos{
    width:60px;
    height:40px;
    margin-top:10px;
    background:black;
    color:white;
    border:2px solid #666;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    font-weight:bold;
    text-align:center;
}
  
  #pitcher-board{
    display:flex;
    justify-content:flex-start;
    gap:4px;
    overflow-x:auto;
    width:100%;
    box-sizing:border-box;
  }

  .pitcher-column{
    width:48px;
    text-align:center;
  }

  .pitcher-role{
    color:white;
    font-size:18px;
    font-weight:bold;
    margin-bottom:10px;
    text-align: center;
  }

  .pitcher-player{
    width:70px;
    height:180px;
    writing-mode:vertical-rl;
    text-orientation:center;
    background:black;
    color:white;
    border:2px solid #666;
    font-size:24px;
  }
  
  .pitcher-column:last-child{
    transform:translate(5px, 28px);
  }

  #batter-section{
    display: none;
  }

  @media screen and (max-width:430px){

    .board-column,
    .pitcher-column{
      width:34px;
    }

    .board-player,
    .pitcher-player{
      width:34px;
      height:110px;
      font-size:16px;
    }

    .board-order,
    .preview-order{
      font-size:24px;
    }

    .board-pos,
    .preview-pos{
      font-size:18px;
    }

    .position-label{
      width:80px;
      font-size:14px;
    }

  }

  @media screen and (orientation:landscape){

    .field-image{
      width:100vw;
      height:auto;
      object-fit:contain;
    }

    #koshien-board,
    #pitcher-board{
      justify-content:center;
    }

    .board-player,
    .pitcher-player{
      height:140px;
    }

  }

  @media screen and (min-width:1000px){

    .field-image{
      width:100vw;
      max-width:none;
    }

    .container{
      width:100vw;
      height:auto;
      display:block;
    }

  }

 </style>
</head>
<body>

<div class="container">
 <img src="stadium.jpg" alt="野球場" class="field-image" />

 <!-- 守備位置の上に選手名が反映される -->
 <div id="position-P" class="position-label" style="top: 71%; left: 50%;">P</div>
 <div id="position-C" class="position-label" style="top: 92%; left: 50%;">C</div>
 <div id="position-1B" class="position-label" style="top: 73%; left: 78%;">1B</div>
 <div id="position-2B" class="position-label" style="top: 64%; left: 64%;">2B</div>
 <div id="position-3B" class="position-label" style="top: 73%; left: 22%;">3B</div>
 <div id="position-SS" class="position-label" style="top: 64%; left: 36%;">SS</div>
 <div id="position-LF" class="position-label" style="top: 57%; left: 16%;">LF</div>
 <div id="position-CF" class="position-label" style="top: 53%; left: 50%;">CF</div>
 <div id="position-RF" class="position-label" style="top: 57%; left: 84%;">RF</div>
 <div id="position-DH" class="position-label" style="top: 88%; left: 15%;">DH</div>
</div>

<div class="input-area">
  <!-- 打順 -->
  <div class="order">
    <h2>Batting Order</h2>
    
    <div id="batter-section">

      <div class="order-item">
        <span class="batting-order">一</span>
        <select class="player-select"></select>
        <select class="position-select"></select>
      </div>

      <div class="order-item">
        <span class="batting-order">二</span>
        <select class="player-select"></select>
        <select class="position-select"></select>
      </div>

      <div class="order-item">
        <span class="batting-order">三</span>
        <select class="player-select"></select>
        <select class="position-select"></select>
      </div>

      <div class="order-item">
        <span class="batting-order">四</span>
        <select class="player-select"></select>
        <select class="position-select"></select>
      </div>

      <div class="order-item">
        <span class="batting-order">五</span>
        <select class="player-select"></select>
        <select class="position-select"></select>
      </div>

      <div class="order-item">
        <span class="batting-order">六</span>
        <select class="player-select"></select>
        <select class="position-select"></select>
      </div>

      <div class="order-item">
        <span class="batting-order">七</span>
        <select class="player-select"></select>
        <select class="position-select"></select>
      </div>

      <div class="order-item">
        <span class="batting-order">八</span>
        <select class="player-select"></select>
        <select class="position-select"></select>
      </div>

      <div class="order-item">
        <span class="batting-order">九</span>
        <select class="player-select"></select>
        <select class="position-select"></select>
      </div>

    </div>
    <div id="koshien-board"></div>
    <div id="koshien-preview"></div>
  </div>

  <!-- 投手 -->
  <div class="pitchers">
    <h2>投手陣</h2>
    <div id="pitcher-board"></div>
  </div>

</div>

<div style="width: 100%; text-align: center; margin: 20px 0;">
  <button onclick="saveData()">保存</button>
  <button onclick="loadData()">読み込み</button>
  <button onclick="resetData()">リセット</button>
</div>

<script>
 // 打順×守備位置エリアの描画
 

updateKoshienPreview();

createKoshienBoard();
createPitcherBoard();

function createKoshienBoard(){

  const board =
  document.getElementById("koshien-board");

  board.innerHTML = "";

  const kansuji =
  ["一","二","三","四","五","六","七","八","九"];

  for(let i=0;i<9;i++){

    const col =
    document.createElement("div");

    col.className =
    "board-column";

    col.innerHTML =
    `
    <div class="board-order">
      ${kansuji[i]}
    </div>

    <select class="board-player">

<option value="">選手名</option>

<option>近本</option>
<option>中野</option>
<option>森下</option>
<option>佐藤</option>
<option>大山</option>
<option>小幡</option>
<option>熊谷</option>
<option>木浪</option>
<option>ディベイニー</option>
<option>中川</option>
<option>高寺</option>
<option>前川</option>
<option>福島</option>
<option>立石</option>
<option>濱田</option>
<option>坂本</option>
<option>伏見</option>
<option>榮田</option>
<option>嶋村</option>
<option>町田</option>
<option>梅野</option>
<option>西</option>
<option>谷端</option>
<option>元山</option>
<option>小野寺</option>
<option>糸原</option>
<option>植田</option>
<option>島田</option>
<option>豊田</option>
<option>岡城</option>
<option>投手</option>

</select>

<select class="board-pos">

<option value="">守備</option>

<option value="P">投</option>
<option value="C">捕</option>
<option value="1B">一</option>
<option value="2B">二</option>
<option value="3B">三</option>
<option value="SS">遊</option>
<option value="LF">左</option>
<option value="CF">中</option>
<option value="RF">右</option>
<option value="DH">DH</option>

</select>
    `;

    board.appendChild(col);
  }

  /* ここから追加 */
  document
  .querySelectorAll(".board-player,.board-pos")
  .forEach(sel=>{

    sel.addEventListener(
      "change",
      updateBoardToField
    );

  });
  /* ここまで追加 */
}

function updateBoardToField(){

  document
  .querySelectorAll(".position-label")
  .forEach(label=>{

    const map = {
      "position-P":"P",
      "position-C":"C",
      "position-1B":"1B",
      "position-2B":"2B",
      "position-3B":"3B",
      "position-SS":"SS",
      "position-LF":"LF",
      "position-CF":"CF",
      "position-RF":"RF",
      "position-DH":"DH"
    };

    label.textContent =
    map[label.id];

  });

  document
  .querySelectorAll(".board-column")
  .forEach(col=>{

    const pos =
    col.querySelector(".board-pos").value;

    const name =
    col.querySelector(".board-player").value;

    if(pos && name){

      const target =
      document.getElementById(
        "position-" + pos
      );

      if(target){

        target.classList.remove(
          "flip-name"
        );

        void target.offsetWidth;

        target.classList.add(
          "flip-name"
        );

        target.textContent =
        name;
      }
    }

  });

}

 // 守備位置ごとに選手を反映
 document.querySelectorAll(".position-select").forEach((posSel, idx) => {
   const playerSel = document.querySelectorAll(".player-select")[idx];

   function updatePositionLabel() {
     const pos = posSel.value;
     const name = playerSel.value;
     if (pos && name) {
       const label = document.getElementById("position-" + pos);
       if (label) {
         label.classList.remove("flip-name");
         void label.offsetWidth;
         label.classList.add("flip-name");
         label.textContent = name;
       }
     }
   }

   posSel.addEventListener("change", () => {
   updatePositionLabel();
   updateKoshienPreview();
 });

 playerSel.addEventListener("change", () => {
   updatePositionLabel();
   updateKoshienPreview();
 });
 });

 // 以下のコードは既存のコードの下に追加

 function saveData() {
   const batters = Array.from(document.querySelectorAll(".order-item")).map(item => {
     return {
       pos: item.querySelector(".position-select").value,
       name: item.querySelector(".player-select").value
     };
   });

   const pitchers = Array.from(document.querySelectorAll(".pitchers select")).map(sel => sel.value);

   const data = {
     batters,
     pitchers
   };

   localStorage.setItem("tigersOrderData", JSON.stringify(data));
   alert("保存しました！");
 }

 function loadData() {
   const data = JSON.parse(localStorage.getItem("tigersOrderData"));
   if (!data) {
     alert("保存されたデータが見つかりません。");
     return;
   }

   const orderItems = document.querySelectorAll(".order-item");
   data.batters.forEach((batter, idx) => {
     if (orderItems[idx]) {
       orderItems[idx].querySelector(".position-select").value = batter.pos;
       orderItems[idx].querySelector(".player-select").value = batter.name;

       // 守備位置ラベル更新
       if (batter.pos && batter.name) {
         const label = document.getElementById("position-" + batter.pos);
         if (label) label.textContent = batter.name;
       }
     }
   });

   const pitcherSelects = document.querySelectorAll(".pitchers select");
   data.pitchers.forEach((val, idx) => {
     if (pitcherSelects[idx]) pitcherSelects[idx].value = val;
   });

   alert("読み込みました！");
 }

 function resetData() {
   if (!confirm("すべての入力をリセットしますか？")) return;

   document.querySelectorAll(".position-select").forEach(sel => sel.value = "");
   document.querySelectorAll(".player-select").forEach(sel => sel.value = "");
   document.querySelectorAll(".pitchers select").forEach(sel => sel.value = "");

   // 守備位置ラベルを初期化
   document.querySelectorAll(".position-label").forEach(label => {
     label.textContent = label.id.replace("position-", "");
   });

   alert("リセットしました");
 }
 
 function createPitcherBoard(){

 const roles = [
  "先発①",
  "先発②",
  "先発③",
  "先発④",
  "先発⑤",
  "先発⑥",
  "中継①",
  "中継②",
  "抑え"
 ];

 const board =
 document.getElementById("pitcher-board");

 board.innerHTML = "";

 roles.forEach(role=>{

  const col =
  document.createElement("div");

  col.className =
  "pitcher-column";

  if(role === "抑え"){
    col.classList.add("closer-column");
  }

  col.innerHTML = `
   <div class="pitcher-role">
    ${role}
   </div>

   <select class="pitcher-player">

<option value="">投手</option>

<option>村上</option>
<option>才木</option>
<option>大竹</option>
<option>伊原</option>
<option>高橋</option>
<option>ルーカス</option>
<option>ラグズデール</option>
<option>茨木</option>
<option>伊藤</option>
<option>下村</option>
<option>今朝丸</option>
<option>西</option>
<option>能登</option>
<option>門別</option>
<option>下村</option>
<option>及川</option>
<option>桐敷</option>
<option>湯浅</option>
<option>畠</option>
<option>木下</option>
<option>工藤</option>
<option>モレッタ</option>
<option>早川</option>
<option>岩貞</option>
<option>岡留</option>
<option>石黒</option>
<option>富田</option>
<option>石井</option>
<option>岩崎</option>
<option>ドリス</option>
</select>
  `;

  board.appendChild(col);

 });

}

 function updateKoshienPreview(){

   const preview =
   document.getElementById("koshien-preview");
   console.log("preview update");

   preview.innerHTML = "";

   const kansuji =
   ["","一","二","三","四","五","六","七","八","九"];

   const items =
   document.querySelectorAll(".order-item");

   console.log(items.length);

   items.forEach((item,index)=>{

     const name =
     item.querySelector(".player-select").value;

     const pos =
     item.querySelector(".position-select").value;

     const col =
     document.createElement("div");

     col.className =
     "preview-column";

     col.innerHTML = `
     <div class="preview-order">
     ${kansuji[index+1]}
     </div>
     <div class="preview-name">
     ${name || "　"}
     </div>
     <div class="preview-pos">
     ${convertPos(pos)}
     </div>

    `;

     preview.appendChild(col);

   });
 }

 function convertPos(pos){

   const map = {
     "P":"投",
     "C":"捕",
     "1B":"一",
     "2B":"二",
     "3B":"三",
     "SS":"遊",
     "LF":"左",
     "CF":"中",
     "RF":"右",
     "DH":"DH"
   };

   return map[pos] || "";
 }
 updateKoshienPreview();
</script>

</body>
</html>
