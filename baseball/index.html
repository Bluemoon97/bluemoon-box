<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>12球団オーダー入力</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      background-color: #f0f0f0;
      overflow-x: hidden;
    }

    .container {
      position: relative;
      max-width: none;
      width: 100%;
      margin: auto;
      background-color: #222;
    }

    .field-image {
      width: 100%;
      max-width: 100%;
      height: auto;
      display: block;
    }

    .position-label {
      width: 80px;
      height: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      background: black;
      color: white;
      border: 2px solid #666;
      padding: 6px 10px;
      font-size: 18px;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-align: center;
      text-overflow: ellipsis;
      transform: translate(-50%, -50%);
      font-family:
        "Yu Mincho",
        "MS Mincho",
        serif;
    }

    .input-area {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      padding: 20px;
      gap: 20px;
      height: 770px;
      /* 無し */
    }

    .order,
    .pitchers {
      background: #111;
      border: 4px solid #444;
      padding: 15px;
      border-radius: 0;
      box-shadow: none;
      color: white;
    }

    .order {
      flex: 1 1 300px;
      width: 100%;
    }

    .pitchers {
      flex: 1 1 200px;
      width: 100%;
    }

    .pitcher-item {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      align-items: center;
    }

    .order-item {
      display: inline-flex;
      flex-direction: column;
      width: 80px;
      margin: 0 4px;
      vertical-align: top;
    }

    .position-select,
    .player-select {
      display: block !important;
      width: 100%;
    }

    .player-select {
      writing-mode: vertical-rl;
      text-orientation: upright;
      height: 180px;
      width: 70px;
      font-size: 24px;
    }

    select {
      background: #000;
      color: #fff;
      border: 2px solid #666;
      font-size: 20px;
      font-weight: bold;
      font-family:
        "Yu Mincho",
        serif;
      height: 50px;
      border-radius: 0;
      -webkit-appearance: none;
      appearance: none;
    }

    label {
      min-width: 50px;
      font-weight: bold;
      font-size: 14px;
    }

    .batting-order {
      display: inline-block;
      width: 50px;
      height: 50px;
      line-height: 50px;
      text-align: center;
      background: black;
      color: white;
      border: 2px solid #666;
      font-size: 28px;
      font-weight: bold;
      padding: 0;
    }

    .flip-name {
      animation: flipBoard 0.6s ease;
    }

    @keyframes flipBoard {

      0% {
        transform:
          translate(-50%, -50%) rotateY(0deg);
      }

      50% {
        transform:
          translate(-50%, -50%) rotateY(90deg);
      }

      100% {
        transform:
          translate(-50%, -50%) rotateY(0deg);
      }
    }

    body {
      background: #222;
    }

    .input-area {
      background: #222;
    }

    .order-item,
    .pitcher-item {
      border-bottom: 1px solid #555;
      padding: 6px 0;
    }

    .order,
    .pitchers,
    .position-label {

      font-family:
        "Yu Mincho",
        "Hiragino Mincho ProN",
        serif;

      letter-spacing: 2px;
    }

    .koshien-header {
      display: none;
      grid-template-columns:
        60px 120px 1fr;
      color: white;
      font-size: 24px;
      margin-bottom: 15px;
      text-align: center;
      font-weight: bold;
    }

    #koshien-preview {
      display: none;
    }

    .preview-column {
      width: 55px;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    .preview-order {
      font-size: 30px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .preview-name {
      writing-mode: vertical-rl;
      text-orientation: upright;
      white-space: nowrap;
      overflow: hidden;
      font-size: 20px;
      height: 170px;
      line-height: 1;
      margin: 8px 0;
      letter-spacing: 2px;
    }

    .preview-pos {
      font-size: 30px;
      font-weight: bold;
      margin-top: 8px;
    }


    #koshien-board {
      display: flex;
      justify-content: center;
      gap: 4px;
      padding: 10px 4px;
      margin-top: 20px;
      overflow-x: auto;
      width: 100%;
      box-sizing: border-box;
    }

    .board-column {
      width: 48px;
      text-align: center;
    }

    .board-order {
      color: white;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .board-player {
      width: 48px;
      height: 150px;
      writing-mode: vertical-rl;
      text-orientation: upright;
      text-align: center;
      background: black;
      color: white;
      border: 2px solid #666;
      font-size: 16px;
      line-height: 1.2;
      padding-top: 4px;
      margin: auto;
    }

    .board-pos {
      width: 48px;
      height: 40px;
      margin-top: 10px;
      background: black;
      color: white;
      border: 2px solid #666;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
    }

    #pitcher-board {
      display: flex;
      justify-content: flex-start;
      gap: 4px;
      overflow-x: auto;
      width: 100%;
      box-sizing: border-box;
    }

    .pitcher-column {
      width: 48px;
      text-align: center;
    }

    .pitcher-role {
      color: white;
      font-size: 18px;
      font-weight: bold;

      height: 60px;

      display: flex;
      justify-content: center;
      align-items: flex-start;

      line-height: 1.2;
      text-align: center;
    }

    .pitcher-player {
      width: 48px;
      height: 150px;
      writing-mode: vertical-rl;
      text-orientation: upright;
      text-align: center;
      background: black;
      color: white;
      border: 2px solid #666;
      font-size: 16px;
      margin: 15px auto 0;
    }

    #batter-section {
      display: none;
    }

    #old-koshien-board {
      display: grid;
      grid-template-columns:
        1fr 280px 1fr;
      gap: 10px;
      margin-bottom: 20px;

      width: 100%;
      /* test */
    }

    #away-team-area,
    #home-team-area {
      background: #111;
      border: 2px solid #555;
      color: white;
      padding: 10px;
      min-height: 180px;
    }

    #center-tower {
      background: none;
      border: none;
      padding: 0;
    }

    #away-team-area {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    #home-team-area {
      display: flex;
      flex-direction: column;
      width: 96%;
      /* test */
    }

    .flag-area {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .flag {
      font-size: 24px;
    }

    .team-flag {
      width: 36px;
      height: 24px;

      background: #333;
      color: white;

      border: 1px solid white;
      border-radius: 2px;

      display: flex;
      justify-content: center;
      align-items: center;

      font-size: 14px;
      font-weight: bold;

      position: relative;
    }

    .team-flag.tigers {
      background:
        repeating-linear-gradient(90deg,
          #ffd700 0px,
          #ffd700 8px,
          #000 8px,
          #000 16px);
      color: white;
    }

    .team-display.tigers {
      color: #ffd800;
    }

    .team-flag.giants {
      background: #111;
      color: #ff7f00;
    }

    .team-display.giants {
      color: #ff8c00;
    }

    .team-flag.dragons {
      background:
        linear-gradient(to bottom,
          #c00000 0%,
          #c00000 25%,
          #003399 25%,
          #003399 100%);
      color: white;
    }

    .team-display.dragons {
      color: #0066cc;
    }

    .team-flag.carp {
      background: #c00000;
      color: white;
    }

    .team-display.carp {
      color: #d40000;
    }

    .team-flag.baystars {
      background: #0050c8;
      color: white;
    }

    .team-display.baystars {
      color: #0099ff;
    }

    .team-flag.swallows {
      background: #00a651;
      color: white;
    }

    .team-display.swallows {
      color: #00aa55;
    }

    .team-flag.hawks {
      background: #f5d000;
      color: black;
    }

    .team-display.hawks {
      color: #f5c400;
    }

    .team-flag.fighters {
      background: #0060a9;
      color: white;
    }

    .team-display.fighters {
      color: #0066cc;
    }

    .team-flag.marines {
      background: #000;
      color: white;
    }

    .team-display.marines {
      color: #eeeeee;
    }

    .team-flag.eagles {
      background: #8b0000;
      color: white;
    }

    .team-display.eagles {
      color: #8b0000;
    }

    .team-flag.buffaloes {
      background: #002244;
      color: white;
    }

    .team-display.buffaloes {
      color: #c9a227;
    }

    .team-flag.lions {
      background: #0066cc;
      color: white;
    }

    .team-display.lions {
      color: #00a0e9;
    }

    /*==============================
  球団ボタン
  ==============================*/

    .team-load.tigers {
      background: #ffd400;
      color: #111;
    }

    .team-load.giants {
      background: #f58220;
      color: #fff;
    }

    .team-load.dragons {
      background: #005bac;
      color: #fff;
    }

    .team-load.carp {
      background: #d7001f;
      color: #fff;
    }

    .team-load.baystars {
      background: #0057b8;
      color: #fff;
    }

    .team-load.swallows {
      background: #2c8c4a;
      color: #fff;
    }

    .team-load.hawks {
      background: #f7d000;
      color: #111;
    }

    .team-load.fighters {
      background: #4fb6e8;
      color: #fff;
    }

    .team-load.marines {
      background: #111;
      color: #fff;
    }

    .team-load.eagles {
      background: #7a0019;
      color: #fff;
    }

    .team-load.buffaloes {
      background: #002b5c;
      color: #fff;
    }

    .team-load.lions {
      background: #008f5a;
      color: #fff;
    }

    .team-flag::before {
      content: "";
      position: absolute;

      left: -1px;
      top: -1px;

      width: 2px;
      height: 40px;

      background: white;
    }

    .team-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .team-side {
      color: white;
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 1px;
      width: 72px;
    }

    .team-display {
      color: #ffd800;
      font-size: 22px;
      font-weight: bold;
      min-width: 120px;
      text-align: left;
    }

    .team-header select {
      width: 60px;
      font-size: 16px;
    }

    .tower-title {
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      margin: 10px 0;
      letter-spacing: 1px;
    }

    #sbo-display {
      display: flex;
      justify-content: center;
      gap: 12px;
      font-size: 24px;
    }

    .lamp {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #222;
      border: 2px solid #666;
    }

    .lamp.on {
      box-shadow: 0 0 10px currentColor;
    }

    .sbo-group {
      text-align: center;
    }

    .sbo-title {
      color: white;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .lamp-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: center;
    }

    .strike.on {
      background: gold;
    }

    .ball.on {
      background: lime;
    }

    .out.on {
      background: red;
    }

    #score-board table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      color: white;
      font-size: 12px;
    }

    #score-board input {
      width: 24px;
      background: black;
      color: white;
      border: none;
      text-align: center;
      font-size: 12px;
    }

    #score-board th,
    #score-board td {
      border: 1px solid #666;
      text-align: center;
      padding: 2px;
      width: 28px;
      height: 30px;
    }

    #away-name,
    #home-name {
      font-weight: bold;
      font-size: 16px;
    }

    #analog-clock {
      width: 70px;
      height: 70px;
      margin: 0 auto;
      position: relative;
      right: 10px;
      top: -5px;
    }

    .clock-face {
      position: relative;
      width: 90px;
      height: 90px;
      /* border:3px solid white; */
      border-radius: 50%;
      background: black;
      margin: auto;
    }

    .clock-center {
      position: absolute;
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    #hour-hand {
      position: absolute;
      width: 4px;
      height: 20px;
      background: white;
      left: 50%;
      bottom: 50%;
      transform-origin: bottom center;
      margin-left: 0px;
      /* 時針の移動 */
    }

    #minute-hand {
      position: absolute;
      width: 2px;
      height: 35px;
      background: white;
      left: 50%;
      bottom: 50%;
      transform-origin: bottom center;
      margin-left: -1px;
    }

    #umpire-area {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }

    .umpire-column {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: white;
      font-weight: bold;
    }

    .umpire-title {
      width: 24px;
      height: 60px;

      display: flex;
      justify-content: center;
      align-items: center;

      color: white;
      font-size: 15px;
      font-weight: bold;

      writing-mode: vertical-rl;
      text-orientation: upright;

      margin: 0 auto;
    }

    .umpire-select {
      width: 48px;
      height: 140px;
      writing-mode: vertical-rl;
      text-orientation: upright;
      background: black;
      color: white;
      border: 2px solid #666;
      font-size: 16px;
      text-align: center;
    }

    #away-order-board {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin-top: 10px;
      margin-bottom: 20px;
      overflow-x: auto;
    }

    .away-column {
      width: 48px;
      text-align: center;
    }

    .away-order {
      color: white;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .away-player {
      width: 48px;
      height: 150px;
      writing-mode: vertical-rl;
      text-orientation: upright;
      text-align: center;
      background: black;
      color: white;
      border: 2px solid #666;
      font-size: 16px;
      line-height: 1.2;
      padding-top: 4px;
      margin: auto;
    }

    .away-pos {
      width: 48px;
      height: 40px;
      margin-top: 10px;
      background: black;
      color: white;
      border: 2px solid #666;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
    }

    #away-pitcher-board {
      display: flex;
      gap: 4px;
    }

    #pitcher-area {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 30px;
      margin-top: 20px;
      padding: 15px;
      background: #111;
      border: 2px solid #555;
      width: 100%;
      box-sizing: border-box;
    }

    #pitcher-area>div {
      width: 48%;
    }

    #away-pitcher-board,
    #pitcher-board {
      display: flex;
      flex-wrap: nowrap;
      gap: 5px;
      overflow-x: auto;
    }

    .away-pitcher-column {
      width: 48px;
      text-align: center;
    }

    .away-pitcher-role {
      color: white;
      font-size: 18px;
      font-weight: bold;

      height: 60px;

      display: flex;
      justify-content: center;
      align-items: flex-start;

      line-height: 1.2;
      text-align: center;
    }

    .away-pitcher-player {
      width: 48px;
      height: 150px;
      writing-mode: vertical-rl;
      text-orientation: upright;
      text-align: center;
      background: black;
      color: white;
      border: 2px solid #666;
      font-size: 16px;
      margin: 15px auto 0;
    }

    .umpire-col {
      text-align: center;
    }

    #umpire-area select {
      width: 40px;
      height: 120px;
      writing-mode: vertical-rl;
      text-orientation: upright;
      background: black;
      color: white;
      border: 2px solid #666;
    }

    #sbo-buttons {
      display: flex;
      justify-content: center;
      gap: 5px;
      margin-top: 10px;
    }

    #tower-top {
      width: 180px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
      left: 0px;
      /* 凸の上側移動 */
      padding: 10px;
      background: #111;
      border: 2px solid #555;
      border-bottom: none;
    }

    #tower-top::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -2px;

      width: 100%;
      height: 4px;

      background: #111;
    }

    #tower-main {
      width: 260px;
      margin: 0 auto;
      background: #111;
      border: 2px solid #555;
      padding: 10px;
      position: relative;
      z-index: 1;
      min-height: 650px;
      /* 815px */
    }

    .clock-face {
      position: relative;
    }

    .clock-number {
      position: absolute;
      color: white;
      font-size: 14px;
      font-weight: bold;
    }

    .n12 {
      top: 4px;
      left: 50%;
      transform: translateX(-50%);
    }

    .n3 {
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
    }

    .n6 {
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
    }

    .n9 {
      left: 6px;
      top: 50%;
      transform: translateY(-50%);
    }

    .tick {
      position: absolute;
      width: 2px;
      height: 8px;
      background: white;
      left: 50%;
      top: 84%;
      transform-origin: center -27.0px;
    }

    .t1 {
      transform: translate(-50%, -50%) rotate(30deg);
    }

    .t2 {
      transform: translate(-50%, -50%) rotate(60deg);
    }

    .t4 {
      transform: translate(-50%, -50%) rotate(120deg);
    }

    .t5 {
      transform: translate(-50%, -50%) rotate(150deg);
    }

    .t7 {
      transform: translate(-50%, -50%) rotate(210deg);
    }

    .t8 {
      transform: translate(-50%, -50%) rotate(240deg);
    }

    .t10 {
      transform: translate(-50%, -50%) rotate(300deg);
    }

    .t11 {
      transform: translate(-50%, -50%) rotate(330deg);
    }

    .team-display {
      cursor: pointer;
    }

    .team-header select {
      display: none;
    }

    .team-header.editing select {
      display: inline-block;
    }

    .team-header.editing .team-display {
      display: none;
    }

    .select-fixed {
      border: none !important;
      background: transparent;
    }

    /*==============================
  ツールバー
  ==============================*/

    #toolbar {

      display: flex;
      flex-wrap: wrap;

      justify-content: center;
      align-items: center;

      gap: 8px;

      margin: 20px 0;

    }

    /*==============================
   共通ボタン
  ==============================*/

    .common-button {
      height: 36px;
      border: 2px solid #555;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: .15s;
      box-shadow:
        0 2px 3px rgba(0, 0, 0, .35);

    }

    .common-button:not(.team-load) {
      min-width: 74px;
      background: #222;
      color: white;
    }

    .team-load {
      width: 46px;
    }

    .common-button:hover {
      transform: translateY(-1px);
    }

    .common-button:active {
      transform: translateY(2px);
      box-shadow: none;
    }

    /*==============================
   選択中の球団
  ==============================*/

    .team-load.active {
      border: 3px solid white;
      transform: scale(1.08);
      box-shadow:
        0 0 10px rgba(255, 255, 255, .9);
    }

    /*==============================
    HOME / VISITOR選択
  ==============================*/

    #team-select-popup {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .45);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .popup-box {
      width: 320px;
      background: #222;
      border: 3px solid silver;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
    }

    .popup-title {
      color: white;
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .popup-btn {
      width: 220px;
      height: 42px;
      margin: 8px 0;
      font-size: 18px;
      font-weight: bold;
    }

    .cancel {
      margin-top: 18px;
    }

    /*==============================
  TEAM PLAYER PANEL
  ==============================*/

    #team-player-popup {
      display: none;

    function loadData() {

      const data = JSON.parse(
        localStorage.getItem(
          "team_" + currentTeamKey
        )
      );

      if (!data) {
        alert("保存されたデータが見つかりません。");
        return;
      }

      if (data.awayTeam)
        document.getElementById("away-team").value =
          data.awayTeam;

      if (data.homeTeam)
        document.getElementById("home-team").value =
          data.homeTeam;

      const isHome =
        loadTarget === "home";

      const boardCols =
        isHome
          ? document.querySelectorAll(".board-column")
          : document.querySelectorAll(".away-column");

      const playerClass =
        isHome
          ? ".board-player"
          : ".away-player";

      const posClass =
        isHome
          ? ".board-pos"
          : ".away-pos";

      const positionPrefix =
        isHome
          ? "position-"
          : "away-position-";

      data.teamData.batters.forEach((batter, idx) => {

        if (!boardCols[idx]) return;

        boardCols[idx]
          .querySelector(playerClass)
          .value = batter.name;

        boardCols[idx]
          .querySelector(posClass)
          .value = batter.pos;

        if (batter.pos && batter.name) {

          const label =
            document.getElementById(
              positionPrefix + batter.pos

          if (label) {

            label.classList.remove("flip-name");
            void label.offsetWidth;
            label.classList.add("flip-name");

            label.textContent = batter.name;

          }

        loadTarget === "home"

          select.classList.add("select-fixed");

    function setClock() {

      const now =
        new Date();

      const hour =
        now.getHours() % 12;

      const minute =
        now.getMinutes();

      const hourDeg =
        hour * 30 + minute * 0.5;

      const minuteDeg =
        minute * 6;

      const hourHand =
        document.getElementById(
          "hour-hand"
        );

      const minuteHand =
        document.getElementById(
          "minute-hand"
        );

      if (hourHand) {

        hourHand.style.transform =
          `translateX(-50%)
      rotate(${hourDeg}deg)`;
      }

      if (minuteHand) {

        minuteHand.style.transform =
          `translateX(-50%)
      rotate(${minuteDeg}deg)`;
      }

    }

    function loadBatters(side, team) {

      const players =
        document.querySelectorAll(

          side === "home"
            ? ".board-player"
            : ".away-player"

        );

      players.forEach(select => {

        /* 一度全部消す */

        select.innerHTML =
          '<option value="">選手名</option>';

        /* 選手追加 */

        teamPlayers[team].batters.forEach(player => {

          const option =
            document.createElement("option");

          option.value = player.name;

          option.textContent = player.name;

          select.appendChild(option);

        });

      });

    }

    function loadPitchers(side, team) {

      const players =
        document.querySelectorAll(

          side === "home"
            ? ".pitcher-player"
            : ".away-pitcher-player"

        );

      players.forEach(select => {

        /* 一度全部消す */

        select.innerHTML =
          '<option value="">投手名</option>';

        /* 投手追加 */

        teamPlayers[team].pitchers.forEach(player => {

          const option =
            document.createElement("option");

          option.value = player;
          option.textContent = player;

          select.appendChild(option);

        });

      });

    }

    function showPlayerList(team) {
      const list =
        document.getElementById("team-player-list");
      list.innerHTML = "";
      teamPlayers[team].batters.forEach(player => {
        const row =
          document.createElement("div");
        row.className = "player-row";
        row.textContent =
          player.name + "　" + player.pos;
        list.appendChild(row);
      });
      document.getElementById("team-player-title").textContent =
        teamNames[team];
      document.getElementById("team-player-popup").style.display =
        "flex";
    }

    function updateFlags() {

      const away =
        document.getElementById("away-team").value;

      const home =
        document.getElementById("home-team").value;

      const awayFlag =
        document.getElementById("away-flag");

      const homeFlag =
        document.getElementById("home-flag");

      const teamText = {
        T: "HT",
        G: "YG",
        D: "CD",
        C: "CC",
        DB: "DB",
        S: "YS",

        H: "SH",
        F: "NF",
        M: "LM",
        E: "RE",
        B: "Bs",
        L: "SL"
      };

      awayFlag.textContent =
        teamText[away];

      homeFlag.textContent =
        teamText[home];

      document.getElementById("away-team-display").textContent =
        teamNames[away];

      document.getElementById("home-team-display").textContent =
        teamNames[home];

      awayFlag.className = "team-flag";
      homeFlag.className = "team-flag";





      awayFlag.classList.add(teamClass[away]);
      homeFlag.classList.add(teamClass[home]);

      document.getElementById("away-name").textContent =
        teamText[away];

      document.getElementById("home-name").textContent =
        teamText[home];

      document.getElementById("away-team-display").className =
        "team-display " + teamClass[away];

      document.getElementById("home-team-display").className =
        "team-display " + teamClass[home];
    }

    document
      .getElementById("away-team")
      .addEventListener(
        "change",
        () => {

          updateFlags();

          awayHeader.classList.remove("editing");

        }
      );

    document
      .getElementById("home-team")
      .addEventListener(
        "change",
        () => {

          updateFlags();

          homeHeader.classList.remove("editing");

        }
      );

    updateFlags();

    const awayHeader =
      document.querySelector("#away-team-area .team-header");

    const awayDisplay =
      document.getElementById("away-team-display");

    const homeHeader =
      document.querySelectorAll("#away-team-area .team-header")[1];

    const homeDisplay =
      document.getElementById("home-team-display");

    homeDisplay.addEventListener("click", () => {

      homeHeader.classList.add("editing");

      document.getElementById("home-team").focus();

    });

    awayDisplay.addEventListener("click", () => {

      awayHeader.classList.add("editing");

      document.getElementById("away-team").focus();

    });

    document.querySelectorAll("select").forEach(select => {

      select.addEventListener("change", () => {

        applySelectFixed();

      });

      select.addEventListener("focus", () => {

        select.classList.remove("select-fixed");

      });

    });

    function applySelectFixed() {

      document.querySelectorAll("select").forEach(select => {

        if (select.value !== "") {
          select.classList.add("select-fixed");
        } else {
          select.classList.remove("select-fixed");
        }

      });

    }

    document
      .getElementById("player-close")
      .addEventListener("click", () => {

        document
          .getElementById("team-player-popup")
          .style.display = "none";

      });

    document.querySelectorAll(".team-load").forEach(button => {
      const team = button.dataset.team;
      button.classList.add(teamClass[team]);
      button.addEventListener("click", () => {
        document.querySelectorAll(".team-load").forEach(btn => {
          btn.classList.remove("active");
        });
        button.classList.add("active");
        selectedTeams.current = team;
        currentTeamKey = team;
        document.getElementById("team-select-popup").style.display = "flex";
      });
    });

    /* キャンセルボタン */

    document
      .getElementById("popup-cancel")
      .addEventListener("click", () => {
        document
          .getElementById("team-select-popup")
          .style.display = "none";
      });

    document
      .getElementById("popup-home")
      .addEventListener("click", () => {

        saveTarget = "home";

        selectedTeams.home = selectedTeams.current;

        document.getElementById("home-team").value =
          selectedTeams.home;

        document.getElementById("home-team-display").textContent =
          teamNames[selectedTeams.home];

        updateFlags();

        loadBatters("home", selectedTeams.home);
        loadPitchers("home", selectedTeams.home);
        document.getElementById("team-select-popup").style.display = "none";

      });

    document
      .getElementById("popup-away")
      .addEventListener("click", () => {

        saveTarget = "away";

        selectedTeams.away = selectedTeams.current;

        document.getElementById("away-team").value =
          selectedTeams.away;

        document.getElementById("away-team-display").textContent =
          teamNames[selectedTeams.away];

        updateFlags();

        loadBatters("away", selectedTeams.away);

        loadPitchers("away", selectedTeams.away);

        document.getElementById("team-select-popup").style.display = "none";

      });

  </script>
