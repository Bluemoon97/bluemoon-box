<!DOCTYPE html>
<html lang="ja">

<head>
    <!-- ========================================
         Shopping Support
         Version 0.1.0
         ホーム画面
         ======================================== -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Shopping Support</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- JavaScript -->
    <script defer src="js/data/maker.js"></script>
    <script defer src="js/data/category.js"></script>
    <script defer src="js/data/product.js"></script>
    <script defer src="js/router.js"></script>
    <script defer src="js/app.js"></script>
</head>

<body>

    <!-- ========================================
         PC・タブレット表示
         ======================================== -->
    <div id="desktop-message">

        <h1>⚠️</h1>

        <p>
            Shopping Support はスマートフォン専用です。
        </p>

        <p>
            PC・タブレットではご利用いただけません。
        </p>

    </div>

    <!-- ========================================
         スマホ画面
         ======================================== -->
    <main id="app">

        <!-- ホーム画面 -->
        <section id="homeScreen">

            <header>

                <h1>Shopping Support</h1>

                <p>Version 0.1.0</p>

            </header>

            <nav>

                <button id="btnCode">
                    📷 コード読取
                </button>

                <button id="btnProduct">
                    ➕ 商品登録
                </button>

                <button id="btnShopping">
                    🛒 購入予定
                </button>

                <button id="btnHistory">
                    📊 履歴・価格比較
                </button>

                <button id="btnCheck">
                    🎒 お出かけチェック
                </button>

                <button id="btnSettings">
                    ⚙️ 設定
                </button>

            </nav>

        </section>

        <!-- コード読取画面 -->
        <section id="codeScreen" hidden>

            <header>

                <button id="btnBackCode">

                    ← 戻る

                </button>

                <h2>コード読取</h2>

            </header>

            <p>

                バーコードを枠内へ合わせてください。

            </p>

            <div id="cameraArea">

                <video id="cameraVideo" autoplay playsinline>

                </video>

                <div id="scanFrame">

                </div>

            </div>

            <p id="scanStatus">

                読み取り待機中...

            </p>

            <div class="scanButtons">

                <button id="btnFlash">

                    🔦 ライト

                </button>

                <button id="btnJanInput">

                    ⌨ JAN入力

                </button>

                <button id="btnCancelScan">

                    ✕ キャンセル

                </button>

            </div>

        </section>

        <!-- 商品登録画面 -->
        <section id="productScreen" hidden>

            <header>

                <button id="btnBackHome">
                    ← 戻る
                </button>

                <h2>商品登録</h2>

            </header>

            <!-- 商品名 -->
            <label for="txtProductName">
                商品名
            </label>

            <input type="text" id="txtProductName" placeholder="例：シャンプー">

            <!-- メーカー -->
            <label for="cmbMaker">
                メーカー
            </label>

            <select id="cmbMaker">

            </select>

            <!-- カテゴリー -->
            <label for="cmbCategory">
                カテゴリー
            </label>

            <select id="cmbCategory">

            </select>

            <!-- 内容量 -->
            <label for="txtVolume">
                内容量
            </label>

            <input type="number" id="txtVolume" placeholder="例：400">

            <!-- 単位 -->
            <label for="cmbUnit">
                単位
            </label>

            <select id="cmbUnit">
                <option value="mL">mL</option>
                <option value="L">L</option>
                <option value="g">g</option>
                <option value="kg">kg</option>
                <option value="個">個</option>
            </select>

            <!-- 保存 -->
            <button id="btnSaveProduct">
                保存
            </button>

            <hr>

            <button id="btnDeletedProducts">

                🗑 削除済みアイテム（0）

            </button>

            <p id="productMessage"></p>

            <hr>
            <h3>登録済み商品</h3>
            <div id="productList"></div>

        </section>

        <!-- 削除済みアイテム画面 -->
        <section id="deletedProductScreen" hidden>

            <header>

                <button id="btnBackProduct">
                    ← 戻る
                </button>

                <h2>削除済みアイテム</h2>

            </header>

            <div id="deletedProductList">

            </div>

        </section>

        <!-- 設定画面 -->
        <section id="settingsScreen" hidden>

            <header>

                <button id="btnBackSettings">

                    ← 戻る

                </button>

                <h2>設定</h2>

            </header>

            <button id="btnMakerMaster">

                メーカー管理

            </button>

            <button id="btnCategoryMaster">

                カテゴリー管理

            </button>

        </section>

        <!-- メーカー管理画面 -->
        <section id="makerScreen" hidden>

            <header>

                <button id="btnBackMaker">

                    ← 戻る

                </button>

                <h2>メーカー管理</h2>

            </header>

            <input type="text" id="txtMakerName" placeholder="メーカー名">

            <button id="btnSaveMaker">

                保存

            </button>

            <div id="makerList">

            </div>

        </section>

        <!-- カテゴリー管理画面 -->
        <section id="categoryScreen" hidden>

            <header>

                <button id="btnBackCategory">

                    ← 戻る

                </button>

                <h2>カテゴリー管理</h2>

            </header>

            <input type="text" id="txtCategoryName" placeholder="カテゴリー名">

            <button id="btnSaveCategory">

                保存

            </button>

            <div id="categoryList">

            </div>

        </section>


    </main>

    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <script defer src="js/barcode/code.js"></script>
    <script defer src="js/barcode/barcode.js"></script>
    <script defer src="js/barcode/qrcode.js"></script>
    <script defer src="js/api/productApi.js"></script>
    

</body>

</html>
